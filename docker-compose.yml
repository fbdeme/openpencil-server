services:
  openpencil:
    image: openpencil-custom:latest
    ports:
      - "3000:3000"
    volumes:
      - claude-data:/root/.claude
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://openpencil:3000
    depends_on:
      - openpencil
    restart: unless-stopped

volumes:
  claude-data:
